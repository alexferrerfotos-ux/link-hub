<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Poli Link Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script>
        // Dados padrão dos links
        const defaultLinks = [
            { id: 1, name: 'PRIVACY', emoji: '🔐', description: '50% OFF - Restam 3 vagas!', url: 'https://privacy.com.br/checkout/barbiepretha', type: 'premium' },
            { id: 2, name: 'TELEGRAM VIP', emoji: '✈️', description: '50% OFF - Restam 5 vagas!', url: 'https://t.me/+xxxxxxxx', type: 'premium' },
            { id: 3, name: 'ONLYFANS', emoji: '❤️', description: '50% OFF - Restam 5 vagas!', url: 'https://onlyfans.com/impoliferreira', type: 'premium' },
            { id: 4, name: 'TELEGRAM', emoji: '✈️', description: 'Canal público - Atualizações', url: 'https://t.me/xxxxxxxx', type: 'free' },
            { id: 5, name: 'PRIVACY FREE', emoji: '🔐', description: 'Acesso gratuito com limite', url: 'https://privacy.com.br/free', type: 'free' },
            { id: 6, name: 'INSTAGRAM', emoji: '📱', description: 'Siga meu perfil', url: 'https://instagram.com/impoliferreira', type: 'social' }
        ];

        let links = JSON.parse(localStorage.getItem('poliLinks')) || defaultLinks;
        let editingId = null;
        let formData = { name: '', emoji: '', description: '', url: '', type: 'free' };

        function saveLinks() {
            localStorage.setItem('poliLinks', JSON.stringify(links));
            renderLinks();
        }

        function renderLinks() {
            const html = `
                <div class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50 p-8">
                    <div class="max-w-6xl mx-auto">
                        <!-- Header -->
                        <div class="mb-8">
                            <h1 class="text-4xl font-bold text-gray-900 mb-2">📱 Painel de Controle - Poli</h1>
                            <p class="text-gray-600">Gerencie seus links facilmente</p>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <!-- Formulário -->
                            <div class="bg-white rounded-xl shadow-lg p-6">
                                <h2 class="text-2xl font-bold text-gray-900 mb-6">
                                    ${editingId ? '✏️ Editar Link' : '➕ Novo Link'}
                                </h2>

                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Emoji 😊</label>
                                        <input type="text" id="emoji" maxlength="2" placeholder="Ex: 📱" value="${formData.emoji}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent text-2xl text-center">
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Link</label>
                                        <input type="text" id="name" placeholder="Ex: ONLYFANS" value="${formData.name}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                                        <input type="text" id="description" placeholder="Ex: 50% OFF - Restam 3 vagas!" value="${formData.description}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">URL (link completo)</label>
                                        <input type="url" id="url" placeholder="https://..." value="${formData.url}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                                    </div>

                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                                        <select id="type" value="${formData.type}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 focus:border-transparent">
                                            <option value="premium">Premium 💎</option>
                                            <option value="free">Gratuito ✨</option>
                                            <option value="social">Social 📲</option>
                                        </select>
                                    </div>

                                    <div class="flex gap-2 pt-4">
                                        <button onclick="addOrUpdateLink()" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition">
                                            ${editingId ? '💾 Atualizar' : '➕ Adicionar'}
                                        </button>
                                        ${editingId ? `<button onclick="cancelEdit()" class="px-4 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Cancelar</button>` : ''}
                                    </div>
                                </div>
                            </div>

                            <!-- Lista de Links -->
                            <div class="bg-white rounded-xl shadow-lg p-6">
                                <h2 class="text-2xl font-bold text-gray-900 mb-6">
                                    🔗 Seus Links (${links.length})
                                </h2>

                                <div class="space-y-3 max-h-96 overflow-y-auto">
                                    ${links.map(link => `
                                        <div class="border border-gray-200 rounded-lg p-4 hover:border-pink-300 transition">
                                            <div class="flex items-start justify-between">
                                                <div class="flex-1">
                                                    <div class="flex items-center gap-2 mb-1">
                                                        <span class="text-2xl">${link.emoji}</span>
                                                        <h3 class="font-bold text-gray-900">${link.name}</h3>
                                                        <span class="text-xs px-2 py-1 rounded ${
                                                            link.type === 'premium' ? 'bg-yellow-100 text-yellow-800' :
                                                            link.type === 'social' ? 'bg-blue-100 text-blue-800' :
                                                            'bg-green-100 text-green-800'
                                                        }">
                                                            ${link.type === 'premium' ? '💎' : link.type === 'social' ? '📲' : '✨'}
                                                        </span>
                                                    </div>
                                                    <p class="text-sm text-gray-600 mb-2">${link.description}</p>
                                                    <p class="text-xs text-gray-500 truncate">${link.url}</p>
                                                </div>
                                                <div class="flex gap-2 ml-2">
                                                    <button onclick="editLink(${link.id})" class="p-2 text-blue-500 hover:bg-blue-50 rounded transition">✏️</button>
                                                    <button onclick="deleteLink(${link.id})" class="p-2 text-red-500 hover:bg-red-50 rounded transition">🗑️</button>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="mt-6 pt-4 border-t border-gray-200">
                                    <button onclick="exportData()" class="w-full py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-semibold transition mb-2">
                                        📥 Copiar código JSON
                                    </button>
                                    <button onclick="resetLinks()" class="w-full py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg font-semibold transition">
                                        🔄 Restaurar padrão
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Info Box -->
                        <div class="mt-8 bg-blue-50 border-l-4 border-blue-500 p-6 rounded">
                            <h3 class="font-bold text-blue-900 mb-2">💡 Como usar no seu site?</h3>
                            <p class="text-blue-800 text-sm mb-2">
                                Os links estão sendo salvos localmente no seu navegador. Para usar no site de verdade, você precisa:
                            </p>
                            <ol class="text-blue-800 text-sm space-y-1 ml-4 list-decimal">
                                <li>Copiar o código JSON (botão verde acima)</li>
                                <li>Criar um arquivo <code class="bg-white px-2 py-1 rounded">links.json</code> no seu repositório</li>
                                <li>Colar o JSON lá</li>
                                <li>Modificar o <code class="bg-white px-2 py-1 rounded">index.html</code> para ler esse arquivo</li>
                            </ol>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('root').innerHTML = html;
        }

        function addOrUpdateLink() {
            const name = document.getElementById('name').value.trim();
            const emoji = document.getElementById('emoji').value.trim();
            const description = document.getElementById('description').value.trim();
            const url = document.getElementById('url').value.trim();
            const type = document.getElementById('type').value;

            if (!name || !emoji || !description || !url) {
                alert('⚠️ Preencha todos os campos!');
                return;
            }

            if (editingId) {
                const link = links.find(l => l.id === editingId);
                if (link) {
                    link.name = name;
                    link.emoji = emoji;
                    link.description = description;
                    link.url = url;
                    link.type = type;
                }
                editingId = null;
            } else {
                const newId = Math.max(...links.map(l => l.id), 0) + 1;
                links.push({ id: newId, name, emoji, description, url, type });
            }

            formData = { name: '', emoji: '', description: '', url: '', type: 'free' };
            saveLinks();
        }

        function editLink(id) {
            const link = links.find(l => l.id === id);
            if (link) {
                editingId = id;
                formData = { ...link };
                renderLinks();
                document.getElementById('name').focus();
            }
        }

        function cancelEdit() {
            editingId = null;
            formData = { name: '', emoji: '', description: '', url: '', type: 'free' };
            renderLinks();
        }

        function deleteLink(id) {
            if (confirm('🗑️ Tem certeza que quer deletar este link?')) {
                links = links.filter(l => l.id !== id);
                saveLinks();
            }
        }

        function exportData() {
            const json = JSON.stringify(links, null, 2);
            navigator.clipboard.writeText(json);
            alert('✅ JSON copiado para a área de transferência!');
            console.log('JSON dos links:', json);
        }

        function resetLinks() {
            if (confirm('🔄 Restaurar os links padrão? Seus dados atuais serão perdidos!')) {
                links = [...defaultLinks];
                saveLinks();
            }
        }

        // Render inicial
        renderLinks();
    </script>
</body>
</html>
